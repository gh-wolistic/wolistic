[mypy]
# Python version
python_version = 3.12

# Import discovery
mypy_path = .
namespace_packages = True
explicit_package_bases = True

# Type checking strictness
warn_return_any = True
warn_unused_configs = True
check_untyped_defs = True
strict_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

# Error reporting
show_error_context = True
show_column_numbers = True
show_error_codes = True
pretty = True

# Incremental mode
incremental = True
cache_dir = .mypy_cache

# Exclude patterns
exclude = (?x)(
    ^alembic/
    | ^tests/
    | ^scripts/
  )

# Per-module options
[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-jwt.*]
ignore_missing_imports = True

# SQLAlchemy models have complex typing
[mypy-app.models.*]
ignore_errors = True
disallow_untyped_defs = False

# Allow gradual typing for complex service logic
[mypy-app.services.*]
disallow_untyped_defs = False
