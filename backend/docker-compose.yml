services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  featured-index-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: featured-index-worker
    env_file:
      - .env
    command: python -m app.scripts.refresh_featured_index
    volumes:
      - .:/app
    depends_on:
      - backend
